name: Build APK From Zip

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Using zip: $ZIP_FILE"
          mkdir appsrc
          unzip "$ZIP_FILE" -d appsrc
          FOUND_PACKAGE=$(find appsrc -name package.json | head -n 1)
          APP_DIR=$(dirname "$FOUND_PACKAGE")
          echo "App folder: $APP_DIR"
          mkdir fixedsrc
          cp -R "$APP_DIR"/. fixedsrc/
          rm -rf appsrc
          mv fixedsrc appsrc

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd appsrc
          npm install

      - name: Add Android
        run: |
          cd appsrc
          npx cap add android

      - name: Copy web files
        run: |
          cd appsrc
          npx cap copy android

      - name: Build APK
        run: |
          cd appsrc/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuestForge5E-debug-apk
          path: appsrc/android/app/build/outputs/apk/debug/app-debug.apk
