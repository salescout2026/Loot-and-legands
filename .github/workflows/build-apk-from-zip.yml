name: Build APK From Zip

on: [workflow_dispatch, push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Unzip source
        run: |
          ZIP_FILE=$(ls *.zip | head -n 1)
          echo "Using zip: $ZIP_FILE"
          rm -rf appsrc fixedsrc
          mkdir appsrc
          unzip "$ZIP_FILE" -d appsrc
          FOUND_PACKAGE=$(find appsrc -name package.json | head -n 1)
          APP_DIR=$(dirname "$FOUND_PACKAGE")
          echo "App folder: $APP_DIR"
          mkdir fixedsrc
          cp -R "$APP_DIR"/. fixedsrc/
          rm -rf appsrc
          mv fixedsrc appsrc

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare app files
        run: |
          cd appsrc

          rm -rf www
          mkdir www

          cp index.html www/index.html
          cp manifest.json www/manifest.json
          cp sw.js www/sw.js
          cp icon.svg www/icon.svg

          cat > capacitor.config.json <<'EOF'
          {
            "appId": "com.questforge5e.lootlegends",
            "appName": "QuestForge5E",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          EOF

          cat > package.json <<'EOF'
          {
            "name": "questforge5e-loot-legends",
            "version": "1.1.0",
            "private": true,
            "description": "QuestForge5E Loot & Legends handcrafted adventure PWA/Android wrapper source.",
            "dependencies": {
              "@capacitor/android": "6.2.0",
              "@capacitor/cli": "6.2.0",
              "@capacitor/core": "6.2.0"
            }
          }
          EOF

      - name: Install dependencies
        run: |
          cd appsrc
          npm install

      - name: Add Android
        run: |
          cd appsrc
          rm -rf android
          npx cap add android

      - name: Sync Android
        run: |
          cd appsrc
          npx cap sync android

      - name: Build APK
        run: |
          cd appsrc/android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: QuestForge5E-debug-apk
          path: appsrc/android/app/build/outputs/apk/debug/app-debug.apk
