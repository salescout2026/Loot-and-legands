name: build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Find project ZIP
        run: |
          ZIP_FILE=$(find . -maxdepth 1 -iname "*.zip" | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No ZIP file found in repo root"
            exit 1
          fi
          echo "ZIP_FILE=$ZIP_FILE" >> $GITHUB_ENV
          echo "Using ZIP: $ZIP_FILE"

      - name: Unzip project
        run: |
          mkdir -p app
          unzip -o "$ZIP_FILE" -d app
          echo "Unzipped contents:"
          find app -maxdepth 3 -type f | head -n 50

      - name: Locate package.json
        run: |
          PACKAGE_DIR=$(find app -name package.json -type f | head -n 1 | xargs dirname)
          if [ -z "$PACKAGE_DIR" ]; then
            echo "No package.json found after unzip"
            exit 1
          fi
          echo "PACKAGE_DIR=$PACKAGE_DIR" >> $GITHUB_ENV
          echo "Package dir: $PACKAGE_DIR"

     - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install
        working-directory: ${{ env.PACKAGE_DIR }}

      - name: Add Android platform
        run: npx cap add android || true
        working-directory: ${{ env.PACKAGE_DIR }}

      - name: Sync Android
        run: npx cap sync android
        working-directory: ${{ env.PACKAGE_DIR }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build debug APK
        run: ./gradlew assembleDebug
        working-directory: ${{ env.PACKAGE_DIR }}/android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Loot-and-Legends-debug-apk
          path: ${{ env.PACKAGE_DIR }}/android/app/build/outputs/apk/debug/*.apk
