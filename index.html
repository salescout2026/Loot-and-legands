<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>QuestForge5E: Loot & Legends</title>
  <meta name="theme-color" content="#2a1b12" />
  <link rel="manifest" href="manifest.json" />
  <style>
    :root{
      --bg:#17100b;--panel:#2a1b12;--panel2:#3b2718;--ink:#f7e6bd;--muted:#c9aa78;--gold:#d6a84f;--green:#5fb36f;--red:#c96555;--blue:#6bb6c9;--line:#78552f;--paper:#f3d99c;--paperInk:#2b1a10;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:radial-gradient(circle at top,#3b2718 0,#17100b 48%,#090605 100%);color:var(--ink);font-family:Georgia,'Times New Roman',serif}
    button,input,select{font:inherit}
    button{border:1px solid #98703a;border-radius:12px;background:linear-gradient(#6b4723,#3c2614);color:#fff1cf;padding:10px 12px;box-shadow:0 2px 0 #1c1008;cursor:pointer}
    button:active{transform:translateY(1px);box-shadow:none}
    button.ghost{background:#23160f;color:var(--muted)}
    button.good{background:linear-gradient(#34774a,#1d4028)} button.warn{background:linear-gradient(#8b5a24,#4b2b12)} button.bad{background:linear-gradient(#8d3d35,#421a17)}
    .app{max-width:1180px;margin:0 auto;padding:12px 12px 80px}
    .top{position:sticky;top:0;z-index:10;background:rgba(23,16,11,.96);border-bottom:1px solid #634425;margin:0 -12px 12px;padding:10px 12px;backdrop-filter:blur(8px)}
    .brand{display:flex;align-items:center;justify-content:space-between;gap:10px}
    h1,h2,h3{margin:.25rem 0;color:#ffe7a4;text-shadow:0 2px 0 #000} h1{font-size:1.5rem} h2{font-size:1.35rem} h3{font-size:1.05rem}
    .subtitle{color:var(--muted);font-size:.95rem}.nav{display:flex;gap:8px;overflow-x:auto;margin-top:10px;padding-bottom:2px}.nav button{white-space:nowrap;padding:8px 10px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}.card{background:linear-gradient(145deg,rgba(58,38,24,.98),rgba(32,20,13,.98));border:1px solid #775433;border-radius:18px;padding:14px;box-shadow:0 12px 30px rgba(0,0,0,.24)}
    .paper{background:linear-gradient(#f8e7b6,#e7c777);color:var(--paperInk);border:2px solid #8d6230;border-radius:18px;padding:16px;box-shadow:inset 0 0 24px rgba(91,58,24,.22),0 12px 32px rgba(0,0,0,.28)}
    .paper h2,.paper h3{color:#442511;text-shadow:none}.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.split{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(240px,.8fr);gap:12px}@media(max-width:780px){.split{grid-template-columns:1fr}}
    .pill{display:inline-flex;align-items:center;gap:5px;border:1px solid #8d6230;border-radius:999px;padding:4px 8px;background:rgba(0,0,0,.18);color:#ffe7a4;font-size:.86rem}.paper .pill{background:rgba(93,54,13,.13);color:#4a2c13}
    .statbar{height:12px;background:#24140d;border:1px solid #805b2d;border-radius:99px;overflow:hidden;min-width:110px}.statfill{height:100%;background:linear-gradient(90deg,#8d2f2a,#e2a14a)}
    .quest-card{position:relative;overflow:hidden}.quest-card:before{content:'';position:absolute;right:-45px;top:-45px;width:125px;height:125px;border-radius:50%;background:rgba(214,168,79,.08)}
    .actions{display:grid;gap:9px;margin-top:12px}.log{max-height:180px;overflow:auto;background:rgba(0,0,0,.24);border:1px solid #60401f;border-radius:12px;padding:10px;color:#e7c777;font-size:.92rem}.small{font-size:.9rem;color:var(--muted)}
    .sceneText{font-size:1.02rem;line-height:1.48}.sceneText p{margin:.65em 0}.sceneText strong{color:#fff4cf}.paper .sceneText strong{color:#341b0c}.choiceNote{font-size:.86rem;color:#d9bc84}.paper .choiceNote{color:#6a4219}
    .mapWrap{height:68vh;min-height:440px;overflow:auto;border:2px solid #7c5630;border-radius:18px;background:#102232;box-shadow:inset 0 0 40px rgba(0,0,0,.45)}
    svg.map{width:1120px;height:760px;display:block;background:linear-gradient(#15324c 0%,#1d4a5e 55%,#184055 100%)}.node circle{stroke:#2a160a;stroke-width:4}.node text{font:700 18px Georgia;fill:#fff0ba;stroke:#2b170c;stroke-width:3px;paint-order:stroke}.route{fill:none;stroke:#f2c45b;stroke-width:7;stroke-linecap:round;stroke-dasharray:14 13;opacity:.75}.route.dim{opacity:.22}.marker{filter:drop-shadow(0 0 10px #ffd56a)}
    .shipSvg{width:100%;max-width:520px;display:block;margin:auto}.inventory{display:flex;gap:7px;flex-wrap:wrap}.item{border:1px solid #8b6a38;border-radius:10px;padding:7px 9px;background:rgba(0,0,0,.18)}
    .footerSpace{height:40px}.input{width:100%;border:1px solid #8b6a38;border-radius:12px;background:#1d120c;color:#ffe7a4;padding:10px;margin:5px 0 10px}.select{width:100%;border:1px solid #8b6a38;border-radius:12px;background:#1d120c;color:#ffe7a4;padding:10px;margin:5px 0 10px}.hr{height:1px;background:#76512a;margin:12px 0}.dangerZone{border-color:#9e4d3d;background:rgba(122,45,36,.22)}
  </style>
</head>
<body>
<div id="app" class="app"></div>
<script>
const SAVE_KEY='questforge5e_loot_legends_shattered_coast_v2';
const CLASSES={fighter:{name:'Fighter',hp:18,mod:4,skill:2,weapon:'Longsword',die:8},rogue:{name:'Rogue',hp:14,mod:5,skill:4,weapon:'Shortbow',die:6},cleric:{name:'Cleric',hp:16,mod:3,skill:3,weapon:'Mace',die:6},wizard:{name:'Wizard',hp:12,mod:4,skill:5,weapon:'Fire Bolt',die:10}};
const ROUTES={
  rats:['Briarhook','Bent Copper Inn','Old Smuggler Tunnel'],
  lantern:['Briarhook','Salt Road','Widow’s Rock','Abandoned Lighthouse'],
  blackroot:['Briarhook','Reed Bridge','Blackroot Marsh','Bone Bloom Grove'],
  cart:['Briarhook','Old King’s Road','Wrecked Cart','Pine Ambush'],
  bell:['Briarhook','Widow’s Rock','Tide Caves','Sunken Stair','Drowned Bell Temple']
};
const LOCS={
  'Briarhook':{x:455,y:380},'Bent Copper Inn':{x:410,y:405},'Old Smuggler Tunnel':{x:354,y:440},'Salt Road':{x:520,y:330},'Widow’s Rock':{x:665,y:255},'Abandoned Lighthouse':{x:720,y:210},'Reed Bridge':{x:345,y:525},'Blackroot Marsh':{x:265,y:610},'Bone Bloom Grove':{x:190,y:640},'Old King’s Road':{x:545,y:485},'Wrecked Cart':{x:675,y:520},'Pine Ambush':{x:760,y:470},'Tide Caves':{x:750,y:310},'Sunken Stair':{x:830,y:385},'Drowned Bell Temple':{x:930,y:440}
};
const QUEST_META={
  rats:{title:'Rats in the Cellar',giver:'Mira Thorne',place:'The Bent Copper Inn',level:'1',tag:'Starter Mystery',summary:'Clear the inn cellar, then discover why the rats were fleeing.',reward:'Gold, potion, map scrap'},
  lantern:{title:'The Lantern on Widow’s Rock',giver:'Garran Pike',place:'Widow’s Rock Lighthouse',level:'1–2',tag:'Spooky Investigation',summary:'Investigate blue ghost-lights flashing from an abandoned lighthouse.',reward:'Blue Flame Lantern, coastal clue'},
  blackroot:{title:'The Blackroot Cure',giver:'Sister Elowen',place:'Blackroot Marsh',level:'2',tag:'Moral Choice',summary:'Gather healing flowers while deciding whether goblins deserve mercy too.',reward:'Healing salve, ally possibility'},
  cart:{title:'The Missing Cart',giver:'Rowan Bell',place:'Old King’s Road',level:'2',tag:'Cult Clue',summary:'Find a missing supply cart and the bone-masked attackers behind it.',reward:'Gold, gear, black shell symbol'},
  bell:{title:'The Bell Beneath the Sea',giver:'Town Elder Corvin',place:'Drowned Bell Temple',level:'3–5',tag:'Major Story Quest',summary:'Stop the Choir of the Drowned Bell before the storm tide wakes an ancient sea power.',reward:'Ending, title, rare relic'}
};
function freshState(){return {view:'home',player:null,gold:20,reputation:0,day:1,location:'Briarhook',activeQuest:null,ship:{hull:1,sails:1,lantern:0,cannon:0},flags:{},quests:{rats:{status:'available',scene:'intro',progress:0},lantern:{status:'available',scene:'intro',progress:0},blackroot:{status:'available',scene:'intro',progress:0},cart:{status:'available',scene:'intro',progress:0},bell:{status:'locked',scene:'harbor',progress:0}},inventory:['Traveler’s Pack','Tinderbox','Rope'],log:['You arrived in Briarhook with a wet cloak, a cheap weapon, and a rumor about vanished ships.'],combat:null,lastRoll:null};}
let state=load();
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||freshState()}catch(e){return freshState()}}
function save(){localStorage.setItem(SAVE_KEY,JSON.stringify(state))}
function cls(){return state.player?CLASSES[state.player.classKey]:CLASSES.fighter}
function hpPct(){return Math.max(0,Math.round((state.player.hp/state.player.maxHp)*100))}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function log(msg){state.log.unshift(msg);state.log=state.log.slice(0,18)}
function has(item){return state.inventory.includes(item)}
function addItem(item){if(!has(item)){state.inventory.push(item);log('Gained item: '+item)}}
function addGold(n){state.gold+=n;log((n>=0?'+':'')+n+' gold')}
function addRep(n){state.reputation+=n;log((n>=0?'+':'')+n+' reputation')}
function flag(name,val=true){state.flags[name]=val;log('Story flag: '+name)}
function d(sides){return Math.floor(Math.random()*sides)+1}
function d20(){return d(20)}
function view(v){state.view=v;save();render()}
function setActive(qid){state.activeQuest=qid;state.view='quest';if(state.quests[qid].status==='available')state.quests[qid].status='inProgress';save();render()}
function setScene(qid,scene,progress){state.quests[qid].scene=scene;if(progress!==undefined)state.quests[qid].progress=progress;state.activeQuest=qid;state.view='quest';save();render()}
function availableQuestIds(){return Object.keys(QUEST_META).filter(id=>state.quests[id]&&state.quests[id].status!=='locked'&&state.quests[id].status!=='completed')}
function completedSmallCount(){return ['rats','lantern','blackroot','cart'].filter(id=>state.quests[id].status==='completed').length}
function refreshUnlocks(){const clues=['mapScrap','hasBlueLantern','foundBlackShell','foundCultChapel'].filter(k=>state.flags[k]).length;if(state.quests.bell.status==='locked'&&(completedSmallCount()>=3||clues>=3)){state.quests.bell.status='available';log('Major quest unlocked: The Bell Beneath the Sea')}}
function completeQuest(qid,msg){state.quests[qid].status='completed';state.activeQuest=null;state.location='Briarhook';log('Completed quest: '+QUEST_META[qid].title);if(msg)log(msg);refreshUnlocks();state.view='board';save();render()}
function heal(n){if(!state.player)return;state.player.hp=Math.min(state.player.maxHp,state.player.hp+n);log('Healed '+n+' HP')}
function damage(n){if(!state.player)return;state.player.hp=Math.max(1,state.player.hp-n);log('Took '+n+' damage')}
function render(){refreshUnlocks();const app=document.getElementById('app');app.innerHTML=top()+main();}
function top(){const p=state.player;return `<div class="top"><div class="brand"><div><h1>⚔️ QuestForge5E</h1><div class="subtitle">Loot & Legends: The Shattered Coast</div></div>${p?`<div class="row"><span class="pill">${esc(p.name)} the ${CLASSES[p.classKey].name}</span><span class="pill">HP ${p.hp}/${p.maxHp}</span><span class="pill">🪙 ${state.gold}</span><span class="pill">⭐ Rep ${state.reputation}</span></div>`:''}</div><div class="nav"><button onclick="view('home')">Home</button><button onclick="view('board')">Quest Board</button><button onclick="view('map')">Map</button><button onclick="view('shipyard')">Shipyard</button><button onclick="view('hero')">Hero</button><button onclick="view('log')">Log</button></div></div>`}
function main(){if(!state.player)return renderCreate();if(state.combat)return renderCombat();if(state.view==='board')return renderBoard();if(state.view==='quest')return renderQuest();if(state.view==='map')return renderMap();if(state.view==='shipyard')return renderShipyard();if(state.view==='hero')return renderHero();if(state.view==='log')return renderLog();return renderHome()}
function renderCreate(){return `<div class="split"><div class="paper"><h2>Begin Your Legend</h2><p>Briarhook needs a hero. Ships vanish, blue lights burn over the cliffs, and old tunnels under town have started breathing cold salt air.</p><label>Hero name</label><input id="heroName" class="input" placeholder="Aric Tidebreaker" value="Rook"><label>Class</label><select id="heroClass" class="select"><option value="fighter">Fighter - sturdy and direct</option><option value="rogue">Rogue - sneaky and skillful</option><option value="cleric">Cleric - durable healer</option><option value="wizard">Wizard - risky power</option></select><button class="good" onclick="createHero()">Create Character</button></div><div class="card"><h3>What changed in this build?</h3><p>This version replaces flat random quests with handcrafted adventures, branching flags, a route map, a shipyard screen, permanent completed quests, and one major story quest: <strong>The Bell Beneath the Sea</strong>.</p></div></div>`}
function createHero(){const name=document.getElementById('heroName').value.trim()||'Rook';const key=document.getElementById('heroClass').value;const c=CLASSES[key];state.player={name,classKey:key,maxHp:c.hp,hp:c.hp,xp:0,level:1};log(name+' arrived in Briarhook.');state.view='home';save();render()}
function renderHome(){const unlocked=state.quests.bell.status!=='locked';return `<div class="split"><div class="paper"><h2>Briarhook, on the Shattered Coast</h2><div class="sceneText"><p>The fishing town crouches beneath black cliffs and gull-haunted ruins. Nets hang drying beside boarded windows. Every tavern whisper says the same thing: ships are vanishing, the dead are walking wet roads, and something beneath the sea has started to sing.</p><p>Your choices now affect the final story. A spared smuggler may guide you. A helped goblin may return the favor. A stolen cart may make the town hate you when you need them most.</p></div><div class="actions"><button class="good" onclick="view('board')">Check the Quest Board</button><button onclick="view('map')">Open the World Map</button>${unlocked?`<button class="warn" onclick="setActive('bell')">Begin the Major Story Quest</button>`:`<button class="ghost" disabled>Major Story Quest locked: gather more clues</button>`}</div></div><div class="card"><h3>Current Threads</h3><p><span class="pill">Small quests completed: ${completedSmallCount()}/4</span></p><p><span class="pill">Bell quest: ${state.quests.bell.status}</span></p><div class="hr"></div><h3>Inventory</h3><div class="inventory">${state.inventory.map(i=>`<span class="item">${esc(i)}</span>`).join('')}</div></div></div>`}
function renderBoard(){const ids=availableQuestIds();return `<div class="paper"><h2>The Briarhook Quest Board</h2><p>Handwritten notices flap under rusty nails. Completed handcrafted quests disappear for good. New story work appears only after you uncover enough clues.</p></div><div class="grid" style="margin-top:12px">${ids.map(id=>questCard(id)).join('')||'<div class="card"><h3>No open notices</h3><p>Rest, explore the map, or check your log.</p></div>'}</div>`}
function questCard(id){const q=QUEST_META[id],s=state.quests[id];return `<div class="card quest-card"><h3>${esc(q.title)}</h3><p class="small">Giver: ${esc(q.giver)} • Level ${q.level} • ${q.tag}</p><p>${esc(q.summary)}</p><p><span class="pill">${esc(q.place)}</span> <span class="pill">${esc(s.status)}</span></p><p class="small">Reward: ${esc(q.reward)}</p><button onclick="setActive('${id}')">${s.status==='inProgress'?'Continue':'Accept'} Quest</button></div>`}
function renderQuest(){const qid=state.activeQuest;if(!qid)return renderBoard();const scene=SCENES[qid][state.quests[qid].scene]||SCENES[qid].intro;const text=typeof scene.text==='function'?scene.text():scene.text;return `<div class="split"><div class="paper"><div class="row"><span class="pill">${QUEST_META[qid].title}</span><span class="pill">${QUEST_META[qid].tag}</span></div><h2>${scene.title}</h2><div class="sceneText">${text}</div><div class="actions">${scene.actions.map(a=>`<button class="${a.kind||''}" onclick="${a.call}">${a.label}</button>${a.note?`<div class="choiceNote">${a.note}</div>`:''}`).join('')}</div></div><div>${routeCard(qid)}${renderLogCard()}</div></div>`}
function routeCard(qid){const route=ROUTES[qid]||['Briarhook'];const prog=state.quests[qid].progress||0;return `<div class="card"><h3>Route Progress</h3>${route.map((r,i)=>`<p><span class="pill">${i<=prog?'✦':'·'} ${esc(r)}</span></p>`).join('')}<button onclick="view('map')">View on Map</button></div>`}
function renderLogCard(){return `<div class="card"><h3>Recent Log</h3><div class="log">${state.log.slice(0,8).map(l=>`<div>• ${esc(l)}</div>`).join('')}</div></div>`}
function check(qid,dc,mod,success,fail,label){const roll=d20();const total=roll+mod;state.lastRoll={roll,total,dc,label};log(`${label}: rolled ${roll}+${mod} = ${total} vs DC ${dc}`);setScene(qid,total>=dc?success:fail)}
function startCombat(qid,enemies,winScene,loseScene){state.combat={qid,enemies:enemies.map(e=>Object.assign({},e)),winScene,loseScene,log:[`Combat begins: ${enemies.map(e=>e.name).join(', ')}`]};state.view='quest';save();render()}
function renderCombat(){const c=state.combat;const enemy=c.enemies[0];const p=state.player;return `<div class="split"><div class="paper"><h2>⚔️ Combat: ${esc(enemy.name)}</h2><p>${enemy.desc||'The enemy closes in.'}</p><div class="row"><span class="pill">${esc(p.name)} HP ${p.hp}/${p.maxHp}</span><div class="statbar"><div class="statfill" style="width:${hpPct()}%"></div></div></div><p><span class="pill">${esc(enemy.name)} HP ${enemy.hp}/${enemy.maxHp}</span></p><div class="actions"><button class="bad" onclick="playerAttack()">Attack with ${esc(cls().weapon)}</button><button onclick="usePotion()">Use Healing Potion</button><button class="ghost" onclick="fleeCombat()">Fall Back</button></div></div><div class="card"><h3>Combat Log</h3><div class="log">${c.log.map(l=>`<div>• ${esc(l)}</div>`).join('')}</div></div></div>`}
function playerAttack(){const c=state.combat,e=c.enemies[0],pc=cls();let roll=d20(),hit=roll+pc.mod+state.player.level;let dmg=d(pc.die)+Math.max(1,Math.floor(pc.mod/2));if(roll===20)dmg+=pc.die;if(hit>=e.ac){e.hp-=dmg;c.log.unshift(`You rolled ${hit} and hit ${e.name} for ${dmg}.`)}else c.log.unshift(`You rolled ${hit}; ${e.name} avoids the blow.`);if(e.hp<=0){c.log.unshift(`${e.name} falls.`);c.enemies.shift();if(!c.enemies.length){const qid=c.qid,win=c.winScene;state.combat=null;setScene(qid,win);return}}enemyAttack();save();render()}
function enemyAttack(){const c=state.combat,e=c.enemies[0];if(!e)return;let roll=d20(),hit=roll+e.mod,dmg=d(e.die)+e.mod;if(hit>=12+Math.floor(cls().mod/2)){state.player.hp-=dmg;c.log.unshift(`${e.name} hits you for ${dmg}.`)}else c.log.unshift(`${e.name} misses.`);if(state.player.hp<=0){state.player.hp=1;c.log.unshift('You collapse, then crawl away wounded.');const qid=c.qid,lose=c.loseScene;state.combat=null;setScene(qid,lose)}}
function usePotion(){if(has('Healing Potion')){state.inventory=state.inventory.filter((i,idx)=>i!=='Healing Potion'||idx!==state.inventory.indexOf('Healing Potion'));heal(8);if(state.combat)state.combat.log.unshift('You drink a healing potion.');save();render()}else{state.combat.log.unshift('No healing potion in your pack.');save();render()}}
function fleeCombat(){const c=state.combat,qid=c.qid,lose=c.loseScene;damage(2);state.combat=null;setScene(qid,lose)}
function rewardSmall(qid){state.player.xp+=50;heal(4);completeQuest(qid,'You return to Briarhook changed by what you learned.')} 
const EN={rats:[{name:'Giant Rat',hp:7,maxHp:7,ac:10,mod:2,die:4,desc:'A swollen cellar rat with red eyes.'},{name:'Tunnel Gnawer',hp:10,maxHp:10,ac:11,mod:3,die:4,desc:'Something bigger than a rat, with bone-white teeth.'}],brine:[{name:'Brine Corpse',hp:14,maxHp:14,ac:11,mod:3,die:6,desc:'A drowned sailor shambles forward, dripping cold seawater.'}],bog:[{name:'Bog Skeleton',hp:12,maxHp:12,ac:12,mod:3,die:6,desc:'Mud and reeds hang from its ribs.'}],cult:[{name:'Bone-Masked Scout',hp:13,maxHp:13,ac:12,mod:4,die:6,desc:'A quick attacker in a shell-painted bone mask.'},{name:'Cult Knife',hp:10,maxHp:10,ac:11,mod:3,die:4,desc:'A desperate follower of the drowned choir.'}],vael:[{name:'Marrow-Speaker Vael',hp:26,maxHp:26,ac:13,mod:5,die:8,desc:'Vael raises a black shell scepter as the bell groans behind him.'},{name:'Drowned Hands',hp:16,maxHp:16,ac:12,mod:4,die:6,desc:'Hands made of corpses and tidewater claw over the stone.'}]};
const SCENES={
 rats:{intro:{title:'Mira’s Cellar',text:'<p>Mira Thorne wrings a towel in both hands. “I asked for help with rats, not heroics. But if you hear knocking behind the wine shelves, do not answer it.”</p><p>The trapdoor breathes out a smell of grain, mildew, and salt.</p>',actions:[{label:'Descend into the cellar',kind:'good',call:"setScene('rats','cellar',1)"},{label:'Return to the board',call:"view('board')"}]},cellar:{title:'Red Eyes in the Grain',text:'<p>Sacks split open across the floor. Red eyes blink between barrels. The rats are not nesting here; they are fleeing upward from a crack in the old stone wall.</p>',actions:[{label:'Fight through the rats',kind:'bad',call:"startCombat('rats',[EN.rats[0]],'wall','hurt')"}]},hurt:{title:'Bitten but Standing',text:'<p>You slam the trapdoor behind you long enough to bind the bites. The squealing below grows louder, as if the cellar itself is chewing.</p>',actions:[{label:'Go back down carefully',call:"setScene('rats','wall')"}]},wall:{title:'The Cracked Wall',text:'<p>Behind the wine racks, old mortar has cracked open. Cold sea air leaks through, impossible this far from the cliffs. A smugglers’ tunnel waits beyond.</p>',actions:[{label:'Seal the crack and take the safe reward',call:"flag('foundTunnel');addGold(12);addRep(1);rewardSmall('rats')"},{label:'Explore the tunnel',kind:'warn',call:"setScene('rats','tunnel',2)",note:'Riskier, but may uncover a story clue.'},{label:'Warn the town guard first',call:"flag('warnedGuard');addRep(2);addGold(8);rewardSmall('rats')"}]},tunnel:{title:'Old Smugglers’ Tunnel',text:'<p>Your torch reveals boot prints, chewed ropes, and a child-sized black shell painted on a stone. Something recently passed this way.</p>',actions:[{label:'Search for the hidden cache',call:"check('rats',12,cls().skill,'cache','gnawer','Perception')"},{label:'Press deeper toward the skittering',kind:'bad',call:"startCombat('rats',[EN.rats[1]],'cache','escape')"}]},gnawer:{title:'The Gnawer Drops',text:'<p>A pale thing falls from the ceiling, all teeth and wet fur.</p>',actions:[{label:'Fight the tunnel gnawer',kind:'bad',call:"startCombat('rats',[EN.rats[1]],'cache','escape')"}]},escape:{title:'Back to the Cellar',text:'<p>You escape with torn sleeves and a useful truth: the tunnel is connected to something old under Briarhook.</p>',actions:[{label:'Report what you found',call:"flag('mapScrap');addItem('Map Scrap');addGold(16);rewardSmall('rats')"}]},cache:{title:'The Smuggler Cache',text:'<p>Inside a rotted chest you find coins, a healing draught, and a brittle map scrap marking ruins below the sea cliffs.</p>',actions:[{label:'Take the cache and report to Mira',kind:'good',call:"flag('mapScrap');addItem('Map Scrap');addItem('Healing Potion');addGold(22);addRep(1);rewardSmall('rats')"}]}}
 ,lantern:{intro:{title:'The Old Sailor’s Warning',text:'<p>Garran Pike points a shaking pipe toward the cliffs. “Widow’s Rock has been dark for twenty years. Last night its lantern burned blue. Blue means the dead are awake.”</p>',actions:[{label:'Take the cliff road to Widow’s Rock',kind:'good',call:"setScene('lantern','climb',1)"},{label:'Return to the board',call:"view('board')"}]},climb:{title:'Wind on the Stairs',text:'<p>The lighthouse leans over black water. Salt wind shoves you against the rail. The stairs inside groan like a ship hull.</p>',actions:[{label:'Climb carefully',call:"check('lantern',12,cls().skill,'lamp','fall','Athletics or Acrobatics')"},{label:'Charge up fast before fear catches you',kind:'warn',call:"setScene('lantern','corpse')"}]},fall:{title:'Rotten Steps',text:'<p>A stair snaps. You catch the rail, but your shoulder hits stone hard. Above you, the blue lantern flares as if laughing.</p>',actions:[{label:'Keep climbing',call:"damage(2);setScene('lantern','lamp',2)"}]},corpse:{title:'The Drowned Watchman',text:'<p>A drowned sailor in a coast guard coat blocks the stairs. Its mouth opens and seawater pours out.</p>',actions:[{label:'Fight the brine corpse',kind:'bad',call:"startCombat('lantern',[EN.brine[0]],'lamp','fall')"}]},lamp:{title:'The Blue Lantern',text:'<p>At the top, the “ghost” is a young smuggler named Pell, pale with fear. “I was warning ships away. Something below the reef is pulling them under.” The lantern burns with blue flame, revealing invisible scratch marks on the glass.</p>',actions:[{label:'Spare Pell and keep his secret',kind:'good',call:"flag('sparedSmuggler');flag('hasBlueLantern');addItem('Blue Flame Lantern');addRep(1);setScene('lantern','ending')"},{label:'Turn Pell in, but claim the lantern as proof',call:"flag('turnedInSmuggler');flag('hasBlueLantern');addItem('Blue Flame Lantern');addGold(18);setScene('lantern','ending')"},{label:'Pressure Pell for names',kind:'warn',call:"flag('sparedSmuggler');flag('hasBlueLantern');flag('cultHeardAtReef');addItem('Blue Flame Lantern');addGold(8);setScene('lantern','ending')"}]},ending:{title:'A Light That Reveals',text:'<p>The Blue Flame Lantern does not merely shine. It reveals marks meant to stay hidden. On the lighthouse wall, it exposes the same black shell symbol from the old tunnels.</p>',actions:[{label:'Return to Briarhook',kind:'good',call:"rewardSmall('lantern')"}]}}
 ,blackroot:{intro:{title:'Sister Elowen’s Request',text:'<p>Children sweat through their blankets in the chapel. Sister Elowen needs blackroot flowers from the marsh before sunset. “Bring enough for the town,” she says. “But the marsh asks a price.”</p>',actions:[{label:'Enter Blackroot Marsh',kind:'good',call:"setScene('blackroot','marsh',1)"},{label:'Return to the board',call:"view('board')"}]},marsh:{title:'The Breathing Marsh',text:'<p>Every step releases bubbles from the mud. White flowers grow around the bones of something too large to name. A wounded goblin reaches for them from the reeds.</p>',actions:[{label:'Speak to the goblin',kind:'good',call:"setScene('blackroot','goblin',2)"},{label:'Grab the flowers quickly',kind:'warn',call:"check('blackroot',13,cls().skill,'flowers','skeleton','Nature')"},{label:'Attack before it calls others',kind:'bad',call:"startCombat('blackroot',[EN.bog[0]],'flowers','mud')"}]},mud:{title:'Mud and Panic',text:'<p>You stagger away from the fight, covered in black marsh water. You still see the flowers ahead.</p>',actions:[{label:'Push to the flowers',call:"setScene('blackroot','flowers')"}]},skeleton:{title:'Bones in the Roots',text:'<p>The marsh rejects your haste. Bones twist upright, dragging reeds like hair.</p>',actions:[{label:'Fight the bog skeleton',kind:'bad',call:"startCombat('blackroot',[EN.bog[0]],'flowers','mud')"}]},goblin:{title:'Two Sick Tribes',text:'<p>The goblin speaks Common through cracked lips. “Small ones burning. Need black flowers. Your stone huts not only ones with children.”</p>',actions:[{label:'Split the flowers',kind:'good',call:"flag('helpedGoblin');addRep(2);addItem('Goblin Reed Charm');setScene('blackroot','mercy')"},{label:'Take all flowers for Briarhook',kind:'warn',call:"flag('tookAllBlackroot');addRep(1);setScene('blackroot','flowers')"},{label:'Give the goblin the first bundle and gather more',kind:'good',call:"flag('helpedGoblin');check('blackroot',12,cls().skill,'mercy','skeleton','Survival')"}]},flowers:{title:'Blackroot Bundle',text:'<p>You collect enough flowers to save Briarhook. The petals leave dark stains on your fingers.</p>',actions:[{label:'Return to Sister Elowen',kind:'good',call:"addItem('Blackroot Salve');heal(6);addRep(2);rewardSmall('blackroot')"}]},mercy:{title:'A Debt in the Reeds',text:'<p>The goblin presses a reed charm into your palm. “When bone-masks hunt you, show this. Marsh remembers.”</p>',actions:[{label:'Bring the remaining flowers home',kind:'good',call:"addItem('Blackroot Salve');heal(8);rewardSmall('blackroot')"}]}}
 ,cart:{intro:{title:'The Empty Road',text:'<p>Merchant Rowan Bell offers a reward for a missing cart. “The strange part? The cargo was cheap flour and lamp oil. Not worth killing for.”</p>',actions:[{label:'Follow Old King’s Road',kind:'good',call:"setScene('cart','tracks',1)"},{label:'Return to the board',call:"view('board')"}]},tracks:{title:'Tracks to Nowhere',text:'<p>The cart sits abandoned beneath pine branches. The cargo is untouched. The horses are gone. Burned circles mark the road like someone set down hot bells.</p>',actions:[{label:'Search for the driver',call:"check('cart',12,cls().skill,'driver','ambush','Investigation')"},{label:'Inspect the burned circles',call:"flag('foundBlackShell');addItem('Black Shell Charm');setScene('cart','ambush',2)"}]},driver:{title:'The Driver in the Ditch',text:'<p>The driver crawls from a ditch, shaking. “Bone masks. They asked about a bell. I told them I only haul flour.”</p>',actions:[{label:'Escort him before tracking attackers',kind:'good',call:"flag('savedCartDriver');addRep(2);setScene('cart','ambush',2)"},{label:'Leave him hidden and track the attackers now',kind:'warn',call:"setScene('cart','ambush',2)"}]},ambush:{title:'Bone Masks in the Pines',text:'<p>A whistle cuts through the trees. Two figures step out wearing carved bone masks painted with a black shell.</p>',actions:[{label:'Fight the cult scouts',kind:'bad',call:"startCombat('cart',EN.cult,'cargo','roadWound')"}]},roadWound:{title:'Roadside Blood',text:'<p>You survive, but the cultists escape into the pines. One dropped charm proves the attacks are connected to the coast.</p>',actions:[{label:'Secure the cart',call:"flag('foundBlackShell');addItem('Black Shell Charm');setScene('cart','cargo')"}]},cargo:{title:'Cargo and Consequences',text:'<p>The cart can still be returned. A crate of lamp oil has split open, revealing a hidden bone mask packed beneath the straw.</p>',actions:[{label:'Return everything honestly',kind:'good',call:"flag('foundBlackShell');addRep(2);addGold(24);rewardSmall('cart')"},{label:'Keep a crate for yourself',kind:'warn',call:"flag('foundBlackShell');flag('stoleCargo');addGold(36);addRep(-2);rewardSmall('cart')"},{label:'Take the bone mask for disguise later',call:"flag('foundBlackShell');addItem('Bone Mask');addGold(18);rewardSmall('cart')"}]}}
 ,bell:{harbor:{title:'The Crewless Ship',text:()=>`<p>A ship crashes into Briarhook harbor with no crew aboard. Scratched into the mast is the black shell symbol. ${has('Blue Flame Lantern')?'Under your Blue Flame Lantern, hidden words appear: <strong>When the bell wakes, the shore shall kneel.</strong>':'The scratches look unfinished. Some hidden meaning waits beyond normal sight.'}</p>`,actions:[{label:'Search the captain’s quarters',call:"flag('foundCultChapel');setScene('bell','chapel',1)"},{label:'Question the frightened townsfolk',call:"addRep(1);setScene('bell','chapel',1)"}]},chapel:{title:'The Bone Mask Trail',text:'<p>The trail leads to an abandoned chapel outside town. Shells, wet rope, and broken holy symbols cover the altar. Beneath the floor is a tide chart marked for tonight’s storm.</p>',actions:[{label:'Sneak in and listen',call:"check('bell',13,cls().skill,'route','chapelFight','Stealth')"},{label:'Kick the door open',kind:'bad',call:"startCombat('bell',[EN.cult[0]],'route','chapelHurt')"},{label:'Wear the bone mask disguise',call:has('Bone Mask')?"flag('usedBoneMask');setScene('bell','route',2)":"setScene('bell','chapelNoMask')"},{label:'Burn the chapel records',kind:'warn',call:"flag('burnedChapel');addRep(-1);setScene('bell','route',2)"}]},chapelNoMask:{title:'No Mask to Wear',text:'<p>You reach for a disguise you do not have. The chapel wind answers with the smell of rot.</p>',actions:[{label:'Try another approach',call:"setScene('bell','chapel')"}]},chapelFight:{title:'Caught at the Altar',text:'<p>A cult sentry turns, knife already drawn.</p>',actions:[{label:'Fight through',kind:'bad',call:"startCombat('bell',[EN.cult[0]],'route','chapelHurt')"}]},chapelHurt:{title:'A Costly Escape',text:'<p>You win your way out, but the cult now knows someone is coming.</p>',actions:[{label:'Race for the tide caves',call:"flag('cultWarned');setScene('bell','route',2)"}]},route:{title:'Tide Cave Descent',text:()=>`<p>The storm begins as you cross the coast road toward Widow’s Rock. ${state.flags.sparedSmuggler?'Pell the smuggler appears from the rain and points out a hidden rope descent. ':''}${state.flags.helpedGoblin?'A goblin scout watches from the reeds, sees your charm, and marks a safer marsh path with white stones. ':''}${state.flags.stoleCargo?'A Briarhook guard refuses to lend supplies after hearing about the missing cargo. ':''}</p><p>The tide caves breathe below. Somewhere deep beneath them, a bell answers thunder.</p>`,actions:[{label:'Enter the tide caves',kind:'good',call:"setScene('bell','stair',3)"},{label:'Open the route map first',call:"view('map')"}]},stair:{title:'The Sunken Stair',text:'<p>You descend through a half-flooded dungeon. Statues of salted kings watch from the walls. Water rises step by step with each distant bell-note.</p>',actions:[{label:'Clear the collapsed entry',call:"check('bell',13,cls().skill,'armory','flood','Athletics')"},{label:'Search for a narrow crawlspace',call:"check('bell',12,cls().skill,'armory','echo','Investigation')"}]},flood:{title:'Rising Water',text:'<p>The stones shift wrong. Cold water slams your legs and nearly takes your pack.</p>',actions:[{label:'Push on',call:"damage(3);setScene('bell','echo',3)"}]},armory:{title:'Flooded Armory',text:'<p>Rusted blades drift in knee-deep water. One sealed case still bears a royal mark.</p>',actions:[{label:'Risk the case for a relic',kind:'warn',call:"addItem('Salt-King Blade');setScene('bell','echo',3)"},{label:'Ignore loot and move fast',call:"setScene('bell','echo',3)"}]},echo:{title:'The Echo Chamber',text:'<p>The bell hums through your bones. It speaks in voices you almost recognize. Prisoners cry out from a pool chamber ahead.</p>',actions:[{label:'Free the prisoners before the ritual',kind:'good',call:"flag('freedPrisoners');addRep(3);setScene('bell','sanctum',4)"},{label:'Go straight for the bell',kind:'warn',call:"setScene('bell','sanctum',4)"},{label:'Use the Blue Flame Lantern on the walls',call:has('Blue Flame Lantern')?"flag('revealedTrueSigil');setScene('bell','sigil')":"setScene('bell','noLantern')"}]},sigil:{title:'The True Sigil',text:'<p>The lantern reveals the ritual’s weak point: three black shells around the bell chain. Break them, and the bell can be silenced before it fully wakes.</p>',actions:[{label:'Mark the weak points and enter the sanctum',kind:'good',call:"setScene('bell','sanctum',4)"}]},noLantern:{title:'Only Darkness Answers',text:'<p>You have no blue flame to reveal the hidden marks. The bell rings again, louder.</p>',actions:[{label:'Enter the sanctum anyway',call:"setScene('bell','sanctum',4)"}]},sanctum:{title:'Marrow-Speaker Vael',text:'<p>Vael stands before a bronze bell the size of a cottage. “Briarhook is already drowned,” he says. “I only ask the sea to admit it.” Prisoners kneel beside rising water as cultists chant.</p>',actions:[{label:'Attack Vael now',kind:'bad',call:"startCombat('bell',EN.vael,'afterVael','darkRing')"},{label:'Try to talk him down',call:"check('bell',16,cls().skill,'talkedVael','afterVael','Persuasion')"},{label:'Pretend to join the cult',kind:'warn',call:"flag('fakeJoined');setScene('bell','sabotage')"},{label:'Cut the bell ropes',call:"check('bell',14,cls().skill,'ropes','darkRing','Athletics')"},{label:'Accept power from the bell',kind:'bad',call:"flag('pactDeep');setScene('bell','pact')"}]},talkedVael:{title:'A Crack in the Marrow-Speaker',text:'<p>For a heartbeat, Vael looks tired instead of holy. Then the bell answers for him. “Too late,” he whispers.</p>',actions:[{label:'Use his hesitation to strike',kind:'bad',call:"flag('vaelShaken');startCombat('bell',[EN.vael[0]],'afterVael','darkRing')"}]},sabotage:{title:'False Devotion',text:'<p>You lower your head and step into the chant. Close enough now, you can reach the ritual shells.</p>',actions:[{label:'Break the ritual shells',kind:'good',call:"flag('brokeRitualShells');startCombat('bell',[EN.vael[0]],'afterVael','darkRing')"},{label:'Stay too long and listen',kind:'bad',call:"flag('temptedByBell');setScene('bell','pact')"}]},ropes:{title:'The Bell Ropes Snap',text:'<p>The first rope parts. The bell swings wild and cracks the stone floor. Vael screams as seawater erupts around him.</p>',actions:[{label:'Finish Vael',kind:'bad',call:"flag('cutBellRopes');startCombat('bell',[EN.vael[0]],'afterVael','darkRing')"}]},pact:{title:'Pact of the Deep',text:'<p>The bell does not ring. It speaks directly into your blood. It offers a spell shaped like a drowning hand and a throne below the tide.</p>',actions:[{label:'Take the pact and end the ritual your way',kind:'bad',call:"addItem('Drowned Pact Mark');setScene('bell','ending')"},{label:'Reject it at the last second',kind:'good',call:"flag('rejectedPact');startCombat('bell',EN.vael,'afterVael','darkRing')"}]},darkRing:{title:'The Bell Rings Once',text:'<p>You survive, but the bell gives one deep note. Far out at sea, something vast turns in its sleep.</p>',actions:[{label:'Escape the collapsing temple',kind:'warn',call:"flag('bellRangOnce');setScene('bell','ending')"}]},afterVael:{title:'Vael Falls',text:'<p>Marrow-Speaker Vael collapses beside the flooded altar. The bell chain strains. The temple waits to see what kind of hero you are.</p>',actions:[{label:'Silence the bell',kind:'good',call:"flag('silencedBell');setScene('bell','ending')"},{label:'Grab treasure before helping anyone',kind:'warn',call:"flag('treasureOverTown');addGold(80);setScene('bell','ending')"},{label:'Let it ring once and listen',kind:'bad',call:"flag('bellRangOnce');setScene('bell','ending')"}]},ending:{title:'Ending: The Shattered Coast Remembers',text:()=>endingText(),actions:[{label:'Complete the story quest',kind:'good',call:"finishBell()"}]}}
};
function endingText(){if(state.flags.pactDeep)return '<p><strong>Corrupt Ending: Pact of the Deep.</strong> You return with power under your skin. The town survives, but children cry when your shadow passes. A hidden cult path is now part of your legend.</p>';if(state.flags.treasureOverTown)return '<p><strong>Selfish Ending: Treasure Over Town.</strong> You escape rich, but not beloved. Survivors whisper that you counted coins while the water rose.</p>';if(state.flags.bellRangOnce&&!state.flags.silencedBell)return '<p><strong>Dark Ending: Bell Rings Once.</strong> Vael is defeated, but the note crossed the sea. Future voyages will not be safe.</p>';let bonus=state.flags.freedPrisoners?' You saved the prisoners.':'';bonus+=state.flags.revealedTrueSigil?' The Blue Flame Lantern exposed the ritual’s weakness.':'';return `<p><strong>Good Ending: Bell Silenced.</strong> The bronze bell cracks without sounding. Briarhook names you <strong>Tidebreaker</strong>.${bonus}</p>`}
function finishBell(){if(state.flags.pactDeep){addItem('Deep-Touched Spell');addRep(-4)}else if(state.flags.bellRangOnce&&!state.flags.silencedBell){addItem('Cracked Bell Shard');addRep(1)}else if(state.flags.treasureOverTown){addRep(-3)}else{addItem('Tidebreaker Medal');addRep(5)}addGold(60);state.player.xp+=200;completeQuest('bell','The first major story arc is complete. New inland adventures can be added next.')}
function renderMap(){const active=state.activeQuest||'bell';const r=ROUTES[active]||ROUTES.bell;const prog=state.quests[active]?state.quests[active].progress:0;let routePath=r.map((name,i)=>(i?'L':'M')+LOCS[name].x+' '+LOCS[name].y).join(' ');return `<div class="paper"><h2>Map of the Shattered Coast</h2><p>This is not a plain list: routes now move across an actual scrollable world map. Active quest: <strong>${QUEST_META[active]?.title||'None'}</strong>.</p></div><div class="mapWrap" style="margin-top:12px"><svg class="map" viewBox="0 0 1120 760" role="img" aria-label="Fantasy coast map"><defs><linearGradient id="land" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#557442"/><stop offset="1" stop-color="#2f4b2b"/></linearGradient><linearGradient id="sand" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#c6a45a"/><stop offset="1" stop-color="#806235"/></linearGradient></defs><path d="M80 130 C200 80 330 95 410 170 C500 250 455 330 540 385 C650 460 780 420 875 510 C945 575 920 680 845 725 L80 725 Z" fill="url(#land)" stroke="#1e341f" stroke-width="6"/><path d="M580 90 C700 40 865 78 950 170 C1020 245 1010 360 940 420 C870 480 760 430 700 365 C640 300 545 250 580 90 Z" fill="url(#land)" stroke="#1e341f" stroke-width="6"/><path d="M420 365 C505 330 565 360 625 415 C540 430 485 425 420 365 Z" fill="url(#sand)" opacity=".82"/><path d="M705 205 C755 175 815 193 850 238 C800 250 755 245 705 205 Z" fill="url(#sand)" opacity=".82"/><path class="route dim" d="M455 380 L720 210 M455 380 L190 640 M455 380 L760 470"/><path class="route marker" d="${routePath}"/>${Object.keys(LOCS).map(name=>{let l=LOCS[name],i=r.indexOf(name),on=i!==-1,done=on&&i<=prog;return `<g class="node ${done?'marker':''}"><circle cx="${l.x}" cy="${l.y}" r="${on?18:12}" fill="${done?'#ffd15a':on?'#75b7c7':'#6d8c55'}"/><text x="${l.x+22}" y="${l.y+6}">${esc(name)}</text></g>`}).join('')}<text x="80" y="70" fill="#fff0ba" font-size="38" font-family="Georgia" stroke="#2b170c" stroke-width="3" paint-order="stroke">The Shattered Coast</text><text x="780" y="115" fill="#fff0ba" font-size="22" font-family="Georgia" stroke="#2b170c" stroke-width="2" paint-order="stroke">Stormbreak Sea</text></svg></div><div class="row" style="margin-top:12px"><button onclick="view('board')">Back to Board</button>${state.activeQuest?`<button class="good" onclick="view('quest')">Return to Active Quest</button>`:''}</div>`}
function renderHero(){const p=state.player,c=cls();return `<div class="split"><div class="paper"><h2>${esc(p.name)} the ${c.name}</h2><p><span class="pill">Level ${p.level}</span> <span class="pill">XP ${p.xp}</span> <span class="pill">Weapon: ${c.weapon}</span></p><p>HP ${p.hp}/${p.maxHp}</p><div class="statbar"><div class="statfill" style="width:${hpPct()}%"></div></div><div class="actions"><button onclick="heal(6);save();render()">Short Rest (+6 HP)</button><button onclick="addItem('Healing Potion');save();render()">Debug: Add Potion</button></div></div><div class="card"><h3>Inventory</h3><div class="inventory">${state.inventory.map(i=>`<span class="item">${esc(i)}</span>`).join('')}</div><div class="hr"></div><h3>Story Flags</h3><div class="log">${Object.keys(state.flags).map(k=>`<div>• ${esc(k)}</div>`).join('')||'No major choices yet.'}</div></div></div>`}
function renderShipyard(){return `<div class="split"><div class="paper"><h2>Briarhook Shipyard</h2><p>The shipyard is now a real screen, not a boring list. Your battered cutter, <strong>The Lucky Wyrm</strong>, can be upgraded for future sea routes.</p><svg class="shipSvg" viewBox="0 0 520 260"><path d="M75 170 C155 215 345 225 445 165 L415 210 C300 250 175 240 105 205 Z" fill="#6b3f22" stroke="#2a160a" stroke-width="6"/><path d="M250 35 L250 178" stroke="#2a160a" stroke-width="8"/><path d="M258 55 C335 80 370 120 275 145 Z" fill="#e8d6a0" stroke="#2a160a" stroke-width="5"/><path d="M242 70 C165 92 155 135 235 160 Z" fill="#f2e4b3" stroke="#2a160a" stroke-width="5"/><circle cx="395" cy="176" r="12" fill="#dfb85a"/><circle cx="345" cy="187" r="10" fill="#dfb85a"/><text x="155" y="230" fill="#fff0ba" font-size="24" font-family="Georgia">The Lucky Wyrm</text></svg></div><div class="card"><h3>Upgrade Bays</h3>${upgradeButton('hull','Reinforced Hull',35,'More durability during sea events.')}${upgradeButton('sails','Storm Sails',30,'Faster map travel and storm choices.')}${upgradeButton('lantern','Blue Lantern Mount',25,'Uses the Blue Flame Lantern at sea.',!has('Blue Flame Lantern'))}${upgradeButton('cannon','Deck Ballista',45,'Prepares ship combat for later arcs.')}<p class="small">Gold: ${state.gold}</p></div></div>`}
function upgradeButton(key,name,cost,desc,locked=false){const lvl=state.ship[key];return `<div class="hr"></div><h3>${name} <span class="pill">Rank ${lvl}</span></h3><p class="small">${desc}</p><button ${locked?'disabled':''} onclick="buyUpgrade('${key}',${cost})">${locked?'Requires Blue Flame Lantern':'Upgrade for '+cost+'g'}</button>`}
function buyUpgrade(key,cost){if(state.gold<cost){log('Not enough gold for that upgrade.');render();return}state.gold-=cost;state.ship[key]++;log('Ship upgrade improved: '+key);save();render()}
function renderLog(){return `<div class="split"><div class="card"><h2>Adventure Log</h2><div class="log" style="max-height:520px">${state.log.map(l=>`<div>• ${esc(l)}</div>`).join('')}</div></div><div class="card dangerZone"><h3>Save Tools</h3><p>Your progress saves automatically on this device.</p><button onclick="save();log('Manual save complete.');render()">Manual Save</button><button class="bad" onclick="resetGame()">Reset Game</button></div></div>`}
function resetGame(){if(confirm('Reset QuestForge5E progress on this device?')){localStorage.removeItem(SAVE_KEY);state=freshState();render()}}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}))}
window.createHero=createHero;window.view=view;window.setActive=setActive;window.setScene=setScene;window.check=check;window.startCombat=startCombat;window.playerAttack=playerAttack;window.usePotion=usePotion;window.fleeCombat=fleeCombat;window.flag=flag;window.addGold=addGold;window.addRep=addRep;window.addItem=addItem;window.rewardSmall=rewardSmall;window.damage=damage;window.heal=heal;window.finishBell=finishBell;window.buyUpgrade=buyUpgrade;window.resetGame=resetGame;window.EN=EN;window.cls=cls;
render();
</script>
</body>
</html>
